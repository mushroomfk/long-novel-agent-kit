name: Verify

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Syntax check
        run: python -m py_compile cli.py server.py install.py scripts/verify_agent_kit.py scripts/adversarial_release_check.py
      - name: Full regression
        run: python scripts/verify_agent_kit.py
      - name: Adversarial release check
        run: python scripts/adversarial_release_check.py
